<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>13 Heart</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    background:#000;
    font-family:'Cormorant Garamond', serif;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

let w =
    canvas.width =
    window.innerWidth;

let h =
    canvas.height =
    window.innerHeight;

window.addEventListener(
    "resize",
    ()=>{

        w =
            canvas.width =
            window.innerWidth;

        h =
            canvas.height =
            window.innerHeight;
    }
);

const centerX = () => w/2;
const centerY = () => h/2 - 60;

// ❤️ HEART

function heartPoint(
    t,
    scale = Math.min(w,h)*0.025
){

    const x =
        16 *
        Math.pow(
            Math.sin(t),
            3
        );

    const y =
        13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t);

    return{

        x:
            centerX() +
            x * scale,

        y:
            centerY() -
            y * scale
    };
}

// ❤️ PARTICLES

const particles = [];
const TOTAL = 1500;

class Particle{

    constructor(){

        this.x =
            Math.random()*w;

        this.y =
            Math.random()*h;

        this.tx = this.x;
        this.ty = this.y;

        this.size =
            Math.random()*4+5;

        this.speed =
            Math.random()*0.04+0.03;

        this.alpha = 0;
    }

    update(){

        this.x +=
            (this.tx - this.x)
            * this.speed;

        this.y +=
            (this.ty - this.y)
            * this.speed;

        this.alpha += 0.015;

        if(this.alpha > 1){

            this.alpha = 1;
        }

        this.floatY = 0;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha =
            this.alpha;

        ctx.imageSmoothingEnabled =
            true;

        ctx.font =
            `${this.size}px Arial`;

        ctx.textAlign =
            "center";

        ctx.textBaseline =
            "middle";

        ctx.fillStyle =
            "#d42020";

        ctx.fillText(
            "13",
            this.x,
            this.y
        );

        ctx.restore();
    }
}

for(let i=0;i<TOTAL;i++){

    particles.push(
        new Particle()
    );
}

// 💬 TEXT

const phrases = [

    "ти втомився",
    "я знаю",
    "але ти сильний",
    "ти справляєшся",
    "не здавайся",
    "я поруч",
    "я вірю в тебе",
    "ти не один"

];

let currentPhrase = 0;
let currentLetter = 0;

let typingText = "";

let typingStarted = false;

let lastLetterTime = 0;
let phraseCompleteTime = 0;

let endingScene = false;

let noOpacity = 1;

let start =
    performance.now();

// 🎬 MAIN LOOP

function animate(time){

    ctx.fillStyle =
        "rgba(0,0,0,1)";

    ctx.fillRect(
        0,
        0,
        w,
        h
    );

    const elapsed =
        time - start;

    const showHeart =
        elapsed < 36000;

    // ❤️ HEART

    if(showHeart){

        particles.forEach((p,i)=>{

            const t =
                (i / TOTAL)
                * Math.PI * 2;

            const pos =
                heartPoint(t);

            // ❤️ FORM HEART

            if(elapsed < 3200){

                p.tx = pos.x;
                p.ty = pos.y;

                p.update();
            }

            // ❤️ FREEZE

            else{

                p.x = pos.x;
                p.y = pos.y;
            }

            p.draw();
        });

        // ❤️ OUTLINE

        if(elapsed > 3200){

            ctx.save();

            ctx.beginPath();

            for(
                let t=0;
                t<Math.PI*2;
                t+=0.01
            ){

                const pos =
                    heartPoint(t);

                if(t===0){

                    ctx.moveTo(
                        pos.x,
                        pos.y
                    );

                }else{

                    ctx.lineTo(
                        pos.x,
                        pos.y
                    );
                }
            }

            ctx.closePath();

            ctx.shadowColor =
                "rgba(255,40,40,0.9)";

            ctx.shadowBlur = 10;

            ctx.strokeStyle =
                "rgba(255,40,40,0.72)";

            ctx.lineWidth = 1.8;

            ctx.stroke();

            ctx.restore();
        }
    }

    // 💬 TEXT

    if(elapsed > 6000 && elapsed < 36000){

        if(!typingStarted){

            typingStarted = true;

            lastLetterTime = time;
        }

        const phrase =
            phrases[currentPhrase];

        const textY =
            centerY() + 10;

        // ⭐ DOT

        if(currentLetter === 0){

            const pulse =
                0.4 +
                Math.sin(
                    time * 0.003
                ) * 0.3;

            ctx.save();

            ctx.globalAlpha =
                pulse;

            ctx.beginPath();

            ctx.fillStyle =
                "#ffffff";

            ctx.arc(

                centerX(),

                textY - 4,

                1.5,

                0,

                Math.PI * 2
            );

            ctx.fill();

            ctx.restore();
        }

        // ✨ TYPING

        const typingDelay =

            currentLetter === 0

            ? 1000

            : Math.random()*70 + 40;

        if(

            time - lastLetterTime >
            typingDelay

        ){

            if(
                currentLetter <
                phrase.length
            ){

                currentLetter++;

                typingText =
                    phrase.substring(
                        0,
                        currentLetter
                    );

                lastLetterTime = time;
            }
        }

        // 🌫️ DISSOLVE

        let textOpacity = 1;

        if(
            currentLetter >=
            phrase.length
        ){

            if(
                phraseCompleteTime === 0
            ){

                phraseCompleteTime = time;
            }

            const hold =
                time -
                phraseCompleteTime;

            if(hold > 1700){

                textOpacity =
                    Math.max(

                        1 -
                        (
                            hold - 1700
                        ) / 1600,

                        0
                    );
            }

            if(hold > 3400){

                currentLetter = 0;

                typingText = "";

                phraseCompleteTime = 0;

                currentPhrase++;

                if(
                    currentPhrase >=
                    phrases.length
                ){

                    currentPhrase =
                        phrases.length - 2;
                }
            }
        }

        // ❤️ TEXT

        ctx.save();

        ctx.globalAlpha =
            textOpacity;

        ctx.textAlign =
            "center";

        ctx.font =
            `400 ${
                Math.min(
                    w * 0.05,
                    38
                )
            }px Cormorant Garamond`;

        ctx.shadowColor =
            "rgba(255,255,255,0.15)";

        ctx.shadowBlur = 10;

        ctx.fillStyle =
            "rgba(255,255,255,0.96)";

        ctx.fillText(

            typingText,

            centerX(),

            textY
        );

        ctx.restore();
    }

    // 🌑 ENDING

    if(elapsed > 36000){

        endingScene = true;

        ctx.fillStyle =
            "rgba(0,0,0,0.22)";

        ctx.fillRect(
            0,
            0,
            w,
            h
        );

        // ❤️ FLOATING HEARTS

        for(let i=0;i<18;i++){

            const hx =
                (
                    (Math.sin(
                        time*0.00022 +
                        i*13
                    ) + 1) / 2
                ) * w;

            const hy =
                (
                    (Math.cos(
                        time*0.00018 +
                        i*7
                    ) + 1) / 2
                ) * h;

            const alpha =
                0.08 +
                Math.sin(
                    time*0.001 +
                    i
                ) * 0.03;

            const size =
                10 +
                Math.sin(
                    time*0.0012 +
                    i
                ) * 2;

            ctx.save();

            ctx.globalAlpha =
                alpha;

            ctx.fillStyle =
                "rgba(255,50,50,0.9)";

            ctx.font =
                `${size}px Arial`;

            ctx.fillText(
                "❤",
                hx,
                hy
            );

            ctx.restore();
        }

        // ❤️ QUESTION

        ctx.save();

        ctx.textAlign =
            "center";

        ctx.fillStyle =
            "#ffffff";

        ctx.font =
            `400 ${
                Math.min(
                    w * 0.06,
                    46
                )
            }px Cormorant Garamond`;

        ctx.shadowColor =
            "rgba(255,255,255,0.12)";

        ctx.shadowBlur = 8;

        ctx.fillText(

            "я ж сильніше тебе кохаю?",

            centerX(),

            centerY() - 40
        );

        // ❤️ YES

        const yesX =
            centerX() - 80;

        const yesY =
            centerY() + 60;

        ctx.font =
            `500 ${
                Math.min(
                    w * 0.07,
                    54
                )
            }px Cormorant Garamond`;

        ctx.fillStyle =
            "#ffffff";

        ctx.fillText(

            "так",

            yesX,

            yesY
        );

        // ❤️ FLOATING NO

        const noFloatX =
            Math.sin(
                time * 0.0017
            ) * 26;

        const noFloatY =
            Math.cos(
                time * 0.0013
            ) * 14;

        const noX =
            centerX() + 110 + noFloatX;

        const noY =
            centerY() + 70 + noFloatY;

        ctx.globalAlpha =
            Math.max(
                noOpacity,
                0.45
            );

        ctx.fillStyle =
            "rgba(255,255,255,0.72)";

        ctx.font =
            `300 ${
                Math.min(
                    w * 0.05,
                    34
                )
            }px Cormorant Garamond`;

        ctx.shadowColor =
            "rgba(255,255,255,0.08)";

        ctx.shadowBlur = 6;

        ctx.fillText(

            "ні",

            noX,

            noY
        );

        ctx.restore();

        if(noOpacity > 0){

            noOpacity -= 0.004;
        }
    }

    requestAnimationFrame(
        animate
    );
}

animate(0);

// ❤️ CLICK

canvas.addEventListener(
    "click",
    (e)=>{

        if(!endingScene) return;

        const rect =
            canvas.getBoundingClientRect();

        const x =
            e.clientX - rect.left;

        const y =
            e.clientY - rect.top;

        const yesX =
            centerX() - 80;

        const yesY =
            centerY() + 60;

        if(

            x > yesX - 60 &&
            x < yesX + 60 &&

            y > yesY - 40 &&
            y < yesY + 20

        ){

            document.body.innerHTML = `

            <div id="finalScene">

                <canvas id="loveCanvas"></canvas>

                <div id="finalText">

                    я так і знала ❤️

                </div>

            </div>

            <style>

            html,
            body{

                margin:0;
                padding:0;

                width:100%;
                height:100%;

                overflow:hidden;

                background:black;
            }

            #finalScene{

                width:100vw;
                height:100vh;

                position:relative;

                background:black;

                overflow:hidden;
            }

            #finalText{

                position:absolute;

                top:50%;
                left:50%;

                transform:
                    translate(-50%,-50%);

                color:white;

                font-family:
                    'Cormorant Garamond',
                    serif;

                font-size:
                    min(8vw,70px);

                font-weight:300;

                opacity:0;

                animation:
                    fadeText 3s forwards;

                text-align:center;

                z-index:2;

                text-shadow:
                    0 0 18px
                    rgba(255,255,255,0.15);
            }

            @keyframes fadeText{

                from{
                    opacity:0;
                    transform:
                        translate(-50%,-44%);
                }

                to{
                    opacity:1;
                    transform:
                        translate(-50%,-50%);
                }
            }

            </style>
            `;

            const loveCanvas =
                document.getElementById(
                    "loveCanvas"
                );

            const lctx =
                loveCanvas.getContext("2d");

            loveCanvas.width =
                window.innerWidth;

            loveCanvas.height =
                window.innerHeight;

            const loveEmojis = [

                "❤️",
                "💖",
                "💘",
                "💕",
                "💞",
                "💓",
                "💗",
                "💝",
                "❤️‍🔥"

            ];

            const floatingHearts = [];

            for(let i=0;i<42;i++){

                floatingHearts.push({

                    x:
                        Math.random()
                        * loveCanvas.width,

                    y:
                        Math.random()
                        * loveCanvas.height,

                    size:
                        Math.random()*26 + 18,

                    speed:
                        Math.random()*0.3 + 0.12,

                    drift:
                        Math.random()*1000,

                    emoji:
                        loveEmojis[
                            Math.floor(
                                Math.random()
                                * loveEmojis.length
                            )
                        ],

                    alpha:
                        Math.random()*0.5 + 0.3
                });
            }

            function animateLoveHearts(t){

                lctx.clearRect(
                    0,
                    0,
                    loveCanvas.width,
                    loveCanvas.height
                );

                floatingHearts.forEach(h=>{

                    h.y -= h.speed;

                    h.x +=
                        Math.sin(
                            t*0.001 +
                            h.drift
                        ) * 0.35;

                    if(h.y < -40){

                        h.y =
                            loveCanvas.height + 40;

                        h.x =
                            Math.random()
                            * loveCanvas.width;
                    }

                    lctx.save();

                    lctx.globalAlpha =
                        h.alpha;

                    lctx.font =
                        `${h.size}px Arial`;

                    lctx.fillText(
                        h.emoji,
                        h.x,
                        h.y
                    );

                    lctx.restore();
                });

                requestAnimationFrame(
                    animateLoveHearts
                );
            }

            animateLoveHearts(0);
        }
    }
);

</script>

</body>
</html>
