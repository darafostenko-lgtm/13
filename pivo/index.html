<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍺 СЬОГОДНІ П'ЄМ?</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;

    font-family:'Inter',sans-serif;

    color:white;

    text-align:center;

    position:relative;
}

/* ГЛОУ */

.glow{

    position:absolute;

    width:200%;
    height:200%;

    background:
    radial-gradient(circle,#ffb30015 0%,transparent 25%),
    radial-gradient(circle,#ff7b0010 0%,transparent 30%);

    filter:blur(160px);

    animation:bgMove 18s linear infinite;
}

@keyframes bgMove{

    0%{
        transform:translate(-10%,-10%);
    }

    50%{
        transform:translate(-18%,-5%);
    }

    100%{
        transform:translate(-10%,-10%);
    }

}

/* ЛІТАЮЧІ ЕМОДЗІ */

.float{

    position:absolute;

    user-select:none;

    pointer-events:none;

    opacity:.15;

    animation:dvdMove linear infinite;
}

@keyframes dvdMove{

    0%{
        transform:translate(0,0);
    }

    25%{
        transform:translate(120px,-160px);
    }

    50%{
        transform:translate(-120px,-260px);
    }

    75%{
        transform:translate(180px,-120px);
    }

    100%{
        transform:translate(0,0);
    }

}

/* ОСНОВА */

.wrap{

    position:relative;

    z-index:5;

    width:90%;
    max-width:720px;
}

/* ТЕКСТ */

.title{

    font-size:78px;
    font-weight:900;

    line-height:1;

    margin-bottom:28px;

    letter-spacing:-4px;

    background:linear-gradient(90deg,#ffe082,#ffb300,#ff7b00);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.text{

    min-height:140px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:10px;

    margin-bottom:55px;

    font-size:30px;

    line-height:1.4;

    color:rgba(255,255,255,.92);
}

/* КНОПКИ */

.buttons{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:24px;
}

button{

    border:none;

    border-radius:18px;

    font-weight:800;

    cursor:pointer;

    transition:.25s ease;
}

/* ТАК */

.yes{

    padding:18px 40px;

    font-size:24px;

    background:linear-gradient(135deg,#ffb703,#fb8500);

    color:white;

    box-shadow:
    0 10px 30px rgba(255,140,0,.25);
}

/* НІ */

.no{

    padding:18px 40px;

    font-size:24px;

    background:#171717;

    color:#ffd166;

    border:1px solid rgba(255,209,102,.2);
}

/* ПИВО */

.beers{

    position:relative;

    width:320px;
    height:180px;

    margin:35px auto;
}

.beer{

    position:absolute;

    font-size:130px;
}

.leftBeer{

    left:0;

    animation:leftBeer .45s infinite alternate ease-in-out;
}

.rightBeer{

    right:0;

    animation:rightBeer .45s infinite alternate ease-in-out;
}

@keyframes leftBeer{

    from{
        transform:rotate(-18deg) translateX(0);
    }

    to{
        transform:rotate(0deg) translateX(58px);
    }

}

@keyframes rightBeer{

    from{
        transform:rotate(18deg) translateX(0);
    }

    to{
        transform:rotate(0deg) translateX(-58px);
    }

}

/* УДАР */

.hit{

    position:absolute;

    left:50%;
    top:42%;

    transform:translate(-50%,-50%);

    font-size:42px;

    animation:hit .45s infinite;
}

@keyframes hit{

    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.5);
    }

    50%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1.3);
    }

    100%{
        opacity:0;
        transform:translate(-50%,-50%) scale(1.9);
    }

}

/* САЛЮТ */

.firework{

    position:absolute;

    font-size:42px;

    animation:boom 2s infinite;
}

@keyframes boom{

    0%{
        opacity:0;
        transform:translateY(0) scale(.4);
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translateY(-340px) scale(1.8);
    }

}

/* П'ЯНИЙ ЕФЕКТ */

.drunk{

    animation:
    drunkMove 3s infinite ease-in-out,
    drunkBlur 3s infinite ease-in-out;
}

@keyframes drunkMove{

    0%{
        transform:rotate(0deg) translateX(0);
    }

    25%{
        transform:rotate(1deg) translateX(8px);
    }

    50%{
        transform:rotate(-1deg) translateX(-8px);
    }

    75%{
        transform:rotate(.5deg) translateX(5px);
    }

    100%{
        transform:rotate(0deg) translateX(0);
    }

}

@keyframes drunkBlur{

    0%{
        filter:blur(0px);
    }

    50%{
        filter:blur(1.5px);
    }

    100%{
        filter:blur(0px);
    }

}

</style>
</head>

<body>

<div class="glow"></div>

<div id="floating"></div>

<div class="wrap">

<div class="title">
🍺 СЬОГОДНІ П'ЄМ?
</div>

<div class="text" id="text">

<div>Пиво вже холодне.</div>
<div>Назад дороги нема 😎</div>

</div>

<div class="buttons">

<button class="yes" id="yesBtn" onclick="party()">
ТАК 🍻
</button>

<button class="no" id="noBtn" onclick="quest()">
НІ 🤨
</button>

</div>

</div>

<script>

/* ФОН */

const items=[
"🍻","🍺","🍤","🍣","🥓","🍕","🍔","🍟","🦐"
];

for(let i=0;i<20;i++){

let el=document.createElement("div");

el.classList.add("float");

el.innerHTML=
items[Math.floor(Math.random()*items.length)];

el.style.left=Math.random()*100+"%";

el.style.top=Math.random()*100+"%";

el.style.fontSize=
(Math.random()*30+28)+"px";

el.style.animationDuration=
(Math.random()*14+10)+"s";

document.body.appendChild(el);

}

/* КВЕСТ */

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const text=document.getElementById("text");

let step=0;

const quests=[

"🤨 не позорся",

"🍺 та я бачу ти вже погодився",

"😭 пиво плаче через тебе 🍺",

"🌭 снеки вже відкриті взагалі-то",

"🔥 ну все, тепер тільки «так»"

];

function quest(){

if(step < quests.length){

text.innerHTML=
`<div>${quests[step]}</div>`;

}

/* НІ ЗМЕНШУЄТЬСЯ */

let noScale = Math.max(0.15, 1 - (step * 0.18));

noBtn.style.transform=
`scale(${noScale})`;

noBtn.style.opacity=
1 - (step * 0.18);

/* ТАК ЗБІЛЬШУЄТЬСЯ */

let yesScale = 1 + (step * 0.15);

yesBtn.style.transform=
`scale(${yesScale})`;

if(step >= 4){

noBtn.style.opacity="0";

setTimeout(()=>{

noBtn.style.display="none";

},200);

text.innerHTML=
`
<div style="font-size:42px;">
🍻 ВИБІР ОЧЕВИДНИЙ
</div>
`;

}

step++;

}

/* ФІНАЛ */

function party(){

document.body.innerHTML=`

<div class="glow"></div>

<div class="firework" style="left:10%;bottom:0;">✨</div>
<div class="firework" style="left:25%;bottom:0;animation-delay:.3s;">🍺</div>
<div class="firework" style="left:45%;bottom:0;animation-delay:.7s;">🍟</div>
<div class="firework" style="left:65%;bottom:0;animation-delay:1.1s;">🍻</div>
<div class="firework" style="left:85%;bottom:0;animation-delay:1.5s;">🌭</div>

<div class="wrap drunk">

<div class="title">
🍻 ПОЇХАЛИ
</div>

<div class="beers">

<div class="beer leftBeer">
🍺
</div>

<div class="beer rightBeer">
🍺
</div>

<div class="hit">
💥
</div>

</div>

<div class="text">

<div>завтра дякувати собі не будеш 😎</div>

<div style="opacity:.7;">
але сьогодні буде весело 🍺
</div>

</div>

</div>

`;

}

</script>

</body>
</html>
